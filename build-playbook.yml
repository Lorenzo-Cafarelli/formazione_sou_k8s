---
# build-playbook.yml
# Esegue la build di Docker sull'host locale (l'agente Jenkins)
- hosts: localhost
  connection: local
  gather_facts: no

  # Definisce le variabili che verranno passate da Jenkins
  # Questi 'default' verranno sovrascritti
  vars:
    image_name: "flask-hello-world"
    image_tag: "latest"

  tasks:
    - name: "Costruisci l'immagine Docker: {{ image_name }}:{{ image_tag }}"
      # Usa il modulo community.docker.docker_image
      # È il modo "corretto" di gestire Docker in Ansible
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "{{ image_tag }}"
        source: build
        # Specifica il percorso del contesto di build (dove si trova il Dockerfile)
        build:
          path: .
        state: present
      
    - name: "Tagga l'immagine anche come 'latest'"
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "latest"
        source: local
        # Assicurati che l'immagine di origine esista
        repository: "{{ image_name }}:{{ image_tag }}"
        state: present
